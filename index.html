<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>산책온 · 대전 MVP 지도</title>
    <!--
      TMAP Web JS SDK v2 — 동기 로드 필수.
      jsv2는 document.write로 실제 SDK를 주입하는 부트스트랩이라, 파싱 시점에 로드돼야 한다.
      appKey는 .env 의 VITE_TMAP_APP_KEY 를 Vite가 빌드/개발 시 %...% 자리에 정적 치환한다.
    -->
    <script src="https://apis.openapi.sk.com/tmap/jsv2?version=1&appKey=%VITE_TMAP_APP_KEY%"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
